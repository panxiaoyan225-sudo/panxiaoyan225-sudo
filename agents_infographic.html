<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw: Multi-Agent Autonomy Architecture</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; color: #24292e; display: flex; justify-content: center; padding: 40px; }
        .container { max-width: 1000px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .diagram-wrapper { position: relative; display: inline-block; border: 1px solid #e1e4e8; border-radius: 8px; overflow: hidden; }
        .diagram-img { display: block; max-width: 100%; height: auto; transition: filter 0.3s ease; }
        
        /* Enlarge Button */
        .enlarge-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(3, 102, 214, 0.9); color: white; padding: 12px 24px; border-radius: 30px; font-weight: bold; border: none; cursor: pointer; opacity: 0; transition: opacity 0.3s ease; z-index: 100; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .diagram-wrapper:hover .enlarge-btn { opacity: 1; }
        .diagram-wrapper:hover .diagram-img { filter: brightness(90%); }

        /* Modal Styling - Optimized for Max Space */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        
        .modal-content {
            width: 100vw;       /* Fill screen width */
            height: 100vh;      /* Fill screen height */
            object-fit: contain; /* Keeps aspect ratio, scales image to fit fully without cropping */
            padding: 20px;      /* Adds a small buffer to ensure edges don't touch the screen border */
            box-sizing: border-box;
            cursor: zoom-out;
        }
        
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

<div class="container">
    <h1>Proving Multi-Agent Autonomy with OpenClaw</h1>
    <div class="diagram-wrapper">
        <button class="enlarge-btn" onclick="openModal()">Enlarge Image</button>
        <img src="ai_agent.jpg" class="diagram-img" alt="OpenClaw Logic Diagram">
    </div>
</div>

<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <img class="modal-content" src="ai_agent.jpg" alt="High Definition Diagram">
</div>

<script>
    function openModal() { document.getElementById("imageModal").style.display = "flex"; }
    function closeModal() { document.getElementById("imageModal").style.display = "none"; }
</script>

</body>
</html>
